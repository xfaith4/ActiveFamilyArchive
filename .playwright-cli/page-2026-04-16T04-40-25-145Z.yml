            - heading "Marriage & Maiden Name Pathway" [level=4] [ref=e1897]
            - paragraph [ref=e1898]: Tracing women in the family tree can be challenging because surnames change at marriage. This pathway walks through the record types most likely to preserve a woman's full identity.
            - list [ref=e1899]:
              - listitem [ref=e1900]:
                - strong [ref=e1901]: Start with the marriage record
                - text: — Marriage certificates and licenses record the bride's maiden name, age, birthplace, and often her parents' names. County courthouse records or vital records offices hold these.
              - listitem [ref=e1902]:
                - strong [ref=e1903]: Check the bride's parents in earlier censuses
                - text: — Once you have the maiden name, search earlier censuses (before the marriage) for a household with that surname and a daughter matching the right age. This can reveal her siblings and parents.
              - listitem [ref=e1904]:
                - strong [ref=e1905]: Look for maiden name in obituaries
                - text: — Newspaper obituaries frequently mention a woman's maiden name, especially in communities where families had long roots. "née [maiden name]" or "formerly of the [surname] family" are common phrasings.
              - listitem [ref=e1906]:
                - strong [ref=e1907]: Check vital records under both names
                - text: — Birth records for a woman's children may list her full maiden name. Death certificates often include the informant — a child or sibling — who may supply the maiden name even if it wasn't used in daily life.
