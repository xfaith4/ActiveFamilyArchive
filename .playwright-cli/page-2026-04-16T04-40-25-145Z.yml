          - generic [ref=e1878]:
            - heading "Local Life Pathway — Quad Cities Area" [level=4] [ref=e1879]
            - paragraph [ref=e1880]: Much of the family's history is rooted in the Quad Cities area — Rock Island, Moline, East Moline, and Davenport. This pathway guides you through the local records that document everyday life in that region.
            - list [ref=e1881]:
              - listitem [ref=e1882]:
                - strong [ref=e1883]: Use census records to anchor the family
                - text: — Federal census records from 1880 through 1940 track Rock Island and Scott County households year by year. Find the family address and look for neighbors — many will be relatives or people who knew the family.
              - listitem [ref=e1884]:
                - strong [ref=e1885]: Search local newspapers
                - text: — The Rock Island Argus, Moline Daily Dispatch, and Davenport newspapers all covered local family news. Births, deaths, church events, school graduations, and community activities were regularly reported.
              - listitem [ref=e1886]:
                - strong [ref=e1887]: Check cemetery records
                - text: — Rock Island County has dozens of cemeteries. Many family members are buried at Chippiannock, Lincoln Memorial Park, or smaller township cemeteries. Cemetery records often include plot maps showing adjacent burials.
              - listitem [ref=e1888]:
                - strong [ref=e1889]: Look at city directories
                - text: — Annual city directories for Rock Island, Moline, and Davenport list residents by name and address, year by year. These can track moves within the metro area and confirm occupations.
