        - generic [ref=e1759]:
          - heading "Record Types in This Archive" [level=3] [ref=e1760]
          - generic [ref=e1761]:
            - generic [ref=e1762]:
              - generic [ref=e1763]:
                - generic [ref=e1764]: 🏠
                - generic [ref=e1765]: Census & Population Records
              - paragraph [ref=e1766]: Federal and state census records list every member of a household — name, age, birthplace, occupation, and relationships — at a specific point in time.
              - paragraph [ref=e1767]:
                - strong [ref=e1768]: "Why it matters:"
                - text: Census records are one of the best ways to place a family at a specific address, confirm who lived together, and estimate birth years for people without birth certificates.
              - paragraph [ref=e1769]:
                - strong [ref=e1770]: "What you'll find:"
                - text: Names, ages, birthplaces, occupations, relationships, and home addresses. Later censuses (1880–1940) include parents' birthplaces and can confirm family groupings.
              - button "View Census & Population Records in Cited Sources →" [ref=e1771] [cursor=pointer]
            - generic [ref=e1772]:
              - generic [ref=e1773]:
                - generic [ref=e1774]: 🎖️
                - generic [ref=e1775]: Military Service Records
              - paragraph [ref=e1776]: Military records include draft registrations, service cards, and pension files that document a person's military experience.
              - paragraph [ref=e1777]:
                - strong [ref=e1778]: "Why it matters:"
                - text: Veterans in the family often left behind some of the most detailed paper trails available — physical descriptions, home addresses, next-of-kin names, and discharge dates.
              - paragraph [ref=e1779]:
                - strong [ref=e1780]: "What you'll find:"
                - text: Physical descriptions, dates of enlistment and discharge, rank, unit assignments, and sometimes family contact information.
              - button "View Military Service Records in Cited Sources →" [ref=e1781] [cursor=pointer]
            - generic [ref=e1782]:
              - generic [ref=e1783]:
                - generic [ref=e1784]: 📋
                - generic [ref=e1785]: Vital Records — Birth, Marriage & Death
              - paragraph [ref=e1786]: "Official records that document the three key milestones in a person's life: when they were born, who they married, and when they died."
              - paragraph [ref=e1787]:
                - strong [ref=e1788]: "Why it matters:"
                - text: Vital records are among the most reliable genealogical documents because they were created at or near the time of the event and often include parents' names, witnesses, and places.
              - paragraph [ref=e1789]:
                - strong [ref=e1790]: "What you'll find:"
                - text: Birth certificates give parents' names. Marriage records give ages and sometimes parents. Death certificates give cause of death and informant details.
              - button "View Vital Records — Birth, Marriage & Death in Cited Sources →" [ref=e1791] [cursor=pointer]
            - generic [ref=e1792]:
              - generic [ref=e1793]:
                - generic [ref=e1794]: 📰
                - generic [ref=e1795]: Newspapers & Obituaries
              - paragraph [ref=e1796]: Local newspapers recorded marriages, deaths, anniversaries, community events, and family news that official records often missed.
              - paragraph [ref=e1797]:
                - strong [ref=e1798]: "Why it matters:"
                - text: Obituaries frequently mention surviving relatives by name — including married daughters whose surnames changed. Wedding announcements name both families and sometimes the church.
              - paragraph [ref=e1799]:
                - strong [ref=e1800]: "What you'll find:"
                - text: Obituaries, wedding notices, anniversary announcements, letters to the editor, social columns, and local news items.
              - button "View Newspapers & Obituaries in Cited Sources →" [ref=e1801] [cursor=pointer]
            - generic [ref=e1802]:
              - generic [ref=e1803]:
                - generic [ref=e1804]: ⛪
                - generic [ref=e1805]: Cemetery & Burial Records
              - paragraph [ref=e1806]: Cemetery records and grave inscriptions confirm death dates and burial locations, and often reveal family groupings through nearby plots.
              - paragraph [ref=e1807]:
                - strong [ref=e1808]: "Why it matters:"
                - text: Families were often buried together. Finding one person's grave can reveal siblings, spouses, and parents buried in the same section — sometimes not otherwise documented.
              - paragraph [ref=e1809]:
                - strong [ref=e1810]: "What you'll find:"
                - text: Death dates, birth dates (when inscribed), military service markers, and the names of others buried in adjacent plots.
              - button "View Cemetery & Burial Records in Cited Sources →" [ref=e1811] [cursor=pointer]
            - generic [ref=e1812]:
              - generic [ref=e1813]:
                - generic [ref=e1814]: 🎓
                - generic [ref=e1815]: School Yearbooks
              - paragraph [ref=e1816]: School yearbooks capture a person at a specific age, place them in a community, and name classmates who may be connected to other family members.
              - paragraph [ref=e1817]:
                - strong [ref=e1818]: "Why it matters:"
                - text: A yearbook photograph can put a human face on a name in the archive. Classmates named may be cousins, neighbors, or future spouses.
              - paragraph [ref=e1819]:
                - strong [ref=e1820]: "What you'll find:"
                - text: Photographs, class years, activity lists, and sometimes graduation quotes or career plans.
              - button "View School Yearbooks in Cited Sources →" [ref=e1821] [cursor=pointer]
            - generic [ref=e1822]:
              - generic [ref=e1823]:
                - generic [ref=e1824]: 🚢
                - generic [ref=e1825]: Immigration & Naturalization
              - paragraph [ref=e1826]: Passenger manifests and naturalization papers document the journey from one country to another and the process of becoming a citizen.
              - paragraph [ref=e1827]:
                - strong [ref=e1828]: "Why it matters:"
                - text: These records can reveal the exact village or town of origin in Europe — information that connects the American branch of the family to its roots abroad.
              - paragraph [ref=e1829]:
                - strong [ref=e1830]: "What you'll find:"
                - text: Port of departure, date of arrival, last residence abroad, closest relative in the home country, and the name of the contact in the destination country.
              - button "View Immigration & Naturalization in Cited Sources →" [ref=e1831] [cursor=pointer]
            - generic [ref=e1832]:
              - generic [ref=e1833]:
                - generic [ref=e1834]: 📖
                - generic [ref=e1835]: Directories & Local Records
              - paragraph [ref=e1836]: City directories, county histories, and local public records place a person in a specific community and occupation at a given time.
              - paragraph [ref=e1837]:
                - strong [ref=e1838]: "Why it matters:"
                - text: Directories were published annually and capture moves year to year. They can confirm an address, a profession, and a neighborhood long before or after a census year.
              - paragraph [ref=e1839]:
                - strong [ref=e1840]: "What you'll find:"
                - text: Names, addresses, occupations, and sometimes business listings. County histories may include biographical sketches of prominent residents.
              - button "View Directories & Local Records in Cited Sources →" [ref=e1841] [cursor=pointer]
        - generic [ref=e1842]:
          - heading "Guided Research Pathways" [level=3] [ref=e1843]
          - paragraph [ref=e1844]: Each pathway walks through a common family-history question step by step. Suggestions point to records that may exist; what you find will depend on the specific people and places involved.
          - generic [ref=e1845]:
            - heading "Immigration Pathway" [level=4] [ref=e1846]
            - paragraph [ref=e1847]: Trace the family's roots from the Midwest back to Europe. This pathway follows the evidence from arrival records to the villages and towns the first generation left behind.
            - list [ref=e1848]:
              - listitem [ref=e1849]:
                - strong [ref=e1850]: Start with what you know
                - text: — Find a family member who immigrated. Census records from around 1900–1930 will list their birthplace and their parents' birthplaces — start there.
              - listitem [ref=e1851]:
                - strong [ref=e1852]: Check passenger lists
                - text: — Search the archive's Immigration records for passenger manifests. These often list the last place of residence abroad and a contact in the origin country.
              - listitem [ref=e1853]:
                - strong [ref=e1854]: Look for naturalization papers
                - text: — Naturalization records frequently name the specific town or village of origin. Look for declarations of intent and final papers filed in the county courthouse.
              - listitem [ref=e1855]:
                - strong [ref=e1856]: Research the origin community
                - text: — Once you have a specific place — a village in Germany, Bohemia, or elsewhere — church records, civil registration, and emigration lists there may extend the family back several more generations.
            - generic [ref=e1857]:
              - generic [ref=e1858]: "Related records in this archive:"
              - button "Immigration & Naturalization" [ref=e1859] [cursor=pointer]
              - button "Census & Population Records" [ref=e1860] [cursor=pointer]
          - generic [ref=e1861]:
            - heading "Military Service Pathway" [level=4] [ref=e1862]
            - paragraph [ref=e1863]: The family archive contains military records spanning several conflicts. This pathway helps you understand what each record type reveals and how to connect a service record to a person's broader life.
            - list [ref=e1864]:
              - listitem [ref=e1865]:
                - strong [ref=e1866]: Identify the conflict and branch
                - text: — World War I, World War II, and other eras each have different record sets. Draft registrations, service records, and discharge papers come from different repositories.
              - listitem [ref=e1867]:
                - strong [ref=e1868]: Check draft registrations
                - text: — WWI and WWII draft cards are among the most widely available military records. They include the registrant's physical description, employer, and next of kin — sometimes revealing a spouse or parents not found elsewhere.
              - listitem [ref=e1869]:
                - strong [ref=e1870]: Look for pension and benefits records
                - text: — Veterans who applied for pensions left behind detailed files. Widow's pension applications are especially rich — they often include marriage certificates, birth records, and affidavits from neighbors.
              - listitem [ref=e1871]:
                - strong [ref=e1872]: Connect to newspapers and cemeteries
                - text: — Many veterans were remembered in local newspaper obituaries with full service histories. Cemetery records may show military service markers.
            - generic [ref=e1873]:
