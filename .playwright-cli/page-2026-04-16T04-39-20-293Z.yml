          - generic [ref=e842]:
            - generic [ref=e843]:
              - generic [ref=e844]:
                - generic [ref=e845]: 🏠
                - generic [ref=e846]: Census & Population Records
              - paragraph [ref=e847]: Federal and state census records list every member of a household — name, age, birthplace, occupation, and relationships — at a specific point in time.
              - paragraph [ref=e848]:
                - strong [ref=e849]: "Why it matters:"
                - text: Census records are one of the best ways to place a family at a specific address, confirm who lived together, and estimate birth years for people without birth certificates.
              - paragraph [ref=e850]:
                - strong [ref=e851]: "What you'll find:"
                - text: Names, ages, birthplaces, occupations, relationships, and home addresses. Later censuses (1880–1940) include parents' birthplaces and can confirm family groupings.
              - button "View Census & Population Records in Cited Sources →" [ref=e852] [cursor=pointer]
            - generic [ref=e853]:
              - generic [ref=e854]:
                - generic [ref=e855]: 🎖️
                - generic [ref=e856]: Military Service Records
              - paragraph [ref=e857]: Military records include draft registrations, service cards, and pension files that document a person's military experience.
              - paragraph [ref=e858]:
                - strong [ref=e859]: "Why it matters:"
                - text: Veterans in the family often left behind some of the most detailed paper trails available — physical descriptions, home addresses, next-of-kin names, and discharge dates.
              - paragraph [ref=e860]:
                - strong [ref=e861]: "What you'll find:"
                - text: Physical descriptions, dates of enlistment and discharge, rank, unit assignments, and sometimes family contact information.
              - button "View Military Service Records in Cited Sources →" [ref=e862] [cursor=pointer]
            - generic [ref=e863]:
              - generic [ref=e864]:
                - generic [ref=e865]: 📋
                - generic [ref=e866]: Vital Records — Birth, Marriage & Death
              - paragraph [ref=e867]: "Official records that document the three key milestones in a person's life: when they were born, who they married, and when they died."
              - paragraph [ref=e868]:
                - strong [ref=e869]: "Why it matters:"
                - text: Vital records are among the most reliable genealogical documents because they were created at or near the time of the event and often include parents' names, witnesses, and places.
              - paragraph [ref=e870]:
                - strong [ref=e871]: "What you'll find:"
                - text: Birth certificates give parents' names. Marriage records give ages and sometimes parents. Death certificates give cause of death and informant details.
              - button "View Vital Records — Birth, Marriage & Death in Cited Sources →" [ref=e872] [cursor=pointer]
            - generic [ref=e873]:
              - generic [ref=e874]:
                - generic [ref=e875]: 📰
                - generic [ref=e876]: Newspapers & Obituaries
              - paragraph [ref=e877]: Local newspapers recorded marriages, deaths, anniversaries, community events, and family news that official records often missed.
              - paragraph [ref=e878]:
                - strong [ref=e879]: "Why it matters:"
                - text: Obituaries frequently mention surviving relatives by name — including married daughters whose surnames changed. Wedding announcements name both families and sometimes the church.
              - paragraph [ref=e880]:
                - strong [ref=e881]: "What you'll find:"
                - text: Obituaries, wedding notices, anniversary announcements, letters to the editor, social columns, and local news items.
              - button "View Newspapers & Obituaries in Cited Sources →" [ref=e882] [cursor=pointer]
            - generic [ref=e883]:
              - generic [ref=e884]:
                - generic [ref=e885]: ⛪
                - generic [ref=e886]: Cemetery & Burial Records
              - paragraph [ref=e887]: Cemetery records and grave inscriptions confirm death dates and burial locations, and often reveal family groupings through nearby plots.
              - paragraph [ref=e888]:
                - strong [ref=e889]: "Why it matters:"
                - text: Families were often buried together. Finding one person's grave can reveal siblings, spouses, and parents buried in the same section — sometimes not otherwise documented.
              - paragraph [ref=e890]:
                - strong [ref=e891]: "What you'll find:"
                - text: Death dates, birth dates (when inscribed), military service markers, and the names of others buried in adjacent plots.
              - button "View Cemetery & Burial Records in Cited Sources →" [ref=e892] [cursor=pointer]
            - generic [ref=e893]:
              - generic [ref=e894]:
                - generic [ref=e895]: 🎓
                - generic [ref=e896]: School Yearbooks
              - paragraph [ref=e897]: School yearbooks capture a person at a specific age, place them in a community, and name classmates who may be connected to other family members.
              - paragraph [ref=e898]:
                - strong [ref=e899]: "Why it matters:"
                - text: A yearbook photograph can put a human face on a name in the archive. Classmates named may be cousins, neighbors, or future spouses.
              - paragraph [ref=e900]:
                - strong [ref=e901]: "What you'll find:"
                - text: Photographs, class years, activity lists, and sometimes graduation quotes or career plans.
              - button "View School Yearbooks in Cited Sources →" [ref=e902] [cursor=pointer]
