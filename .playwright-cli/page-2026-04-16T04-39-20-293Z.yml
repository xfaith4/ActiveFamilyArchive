        - generic [ref=e923]:
          - heading "Guided Research Pathways" [level=3] [ref=e924]
          - paragraph [ref=e925]: Each pathway walks through a common family-history question step by step. Suggestions point to records that may exist; what you find will depend on the specific people and places involved.
          - generic [ref=e926]:
            - heading "Immigration Pathway" [level=4] [ref=e927]
            - paragraph [ref=e928]: Trace the family's roots from the Midwest back to Europe. This pathway follows the evidence from arrival records to the villages and towns the first generation left behind.
            - list [ref=e929]:
              - listitem [ref=e930]:
                - strong [ref=e931]: Start with what you know
                - text: — Find a family member who immigrated. Census records from around 1900–1930 will list their birthplace and their parents' birthplaces — start there.
              - listitem [ref=e932]:
                - strong [ref=e933]: Check passenger lists
                - text: — Search the archive's Immigration records for passenger manifests. These often list the last place of residence abroad and a contact in the origin country.
              - listitem [ref=e934]:
                - strong [ref=e935]: Look for naturalization papers
                - text: — Naturalization records frequently name the specific town or village of origin. Look for declarations of intent and final papers filed in the county courthouse.
              - listitem [ref=e936]:
                - strong [ref=e937]: Research the origin community
                - text: — Once you have a specific place — a village in Germany, Bohemia, or elsewhere — church records, civil registration, and emigration lists there may extend the family back several more generations.
            - generic [ref=e938]:
              - generic [ref=e939]: "Related records in this archive:"
              - button "Immigration & Naturalization" [ref=e940] [cursor=pointer]
              - button "Census & Population Records" [ref=e941] [cursor=pointer]
          - generic [ref=e942]:
            - heading "Military Service Pathway" [level=4] [ref=e943]
            - paragraph [ref=e944]: The family archive contains military records spanning several conflicts. This pathway helps you understand what each record type reveals and how to connect a service record to a person's broader life.
            - list [ref=e945]:
              - listitem [ref=e946]:
                - strong [ref=e947]: Identify the conflict and branch
                - text: — World War I, World War II, and other eras each have different record sets. Draft registrations, service records, and discharge papers come from different repositories.
              - listitem [ref=e948]:
                - strong [ref=e949]: Check draft registrations
                - text: — WWI and WWII draft cards are among the most widely available military records. They include the registrant's physical description, employer, and next of kin — sometimes revealing a spouse or parents not found elsewhere.
              - listitem [ref=e950]:
                - strong [ref=e951]: Look for pension and benefits records
                - text: — Veterans who applied for pensions left behind detailed files. Widow's pension applications are especially rich — they often include marriage certificates, birth records, and affidavits from neighbors.
              - listitem [ref=e952]:
                - strong [ref=e953]: Connect to newspapers and cemeteries
                - text: — Many veterans were remembered in local newspaper obituaries with full service histories. Cemetery records may show military service markers.
            - generic [ref=e954]:
              - generic [ref=e955]: "Related records in this archive:"
              - button "Military Service Records" [ref=e956] [cursor=pointer]
              - button "Newspapers & Obituaries" [ref=e957] [cursor=pointer]
              - button "Cemetery & Burial Records" [ref=e958] [cursor=pointer]
          - generic [ref=e959]:
            - heading "Local Life Pathway — Quad Cities Area" [level=4] [ref=e960]
            - paragraph [ref=e961]: Much of the family's history is rooted in the Quad Cities area — Rock Island, Moline, East Moline, and Davenport. This pathway guides you through the local records that document everyday life in that region.
            - list [ref=e962]:
              - listitem [ref=e963]:
                - strong [ref=e964]: Use census records to anchor the family
                - text: — Federal census records from 1880 through 1940 track Rock Island and Scott County households year by year. Find the family address and look for neighbors — many will be relatives or people who knew the family.
              - listitem [ref=e965]:
                - strong [ref=e966]: Search local newspapers
                - text: — The Rock Island Argus, Moline Daily Dispatch, and Davenport newspapers all covered local family news. Births, deaths, church events, school graduations, and community activities were regularly reported.
              - listitem [ref=e967]:
                - strong [ref=e968]: Check cemetery records
                - text: — Rock Island County has dozens of cemeteries. Many family members are buried at Chippiannock, Lincoln Memorial Park, or smaller township cemeteries. Cemetery records often include plot maps showing adjacent burials.
              - listitem [ref=e969]:
                - strong [ref=e970]: Look at city directories
                - text: — Annual city directories for Rock Island, Moline, and Davenport list residents by name and address, year by year. These can track moves within the metro area and confirm occupations.
            - generic [ref=e971]:
              - generic [ref=e972]: "Related records in this archive:"
              - button "Census & Population Records" [ref=e973] [cursor=pointer]
              - button "Newspapers & Obituaries" [ref=e974] [cursor=pointer]
