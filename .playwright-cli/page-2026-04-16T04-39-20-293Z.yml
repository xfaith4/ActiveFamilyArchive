                - generic [ref=e915]: 📖
                - generic [ref=e916]: Directories & Local Records
              - paragraph [ref=e917]: City directories, county histories, and local public records place a person in a specific community and occupation at a given time.
              - paragraph [ref=e918]:
                - strong [ref=e919]: "Why it matters:"
                - text: Directories were published annually and capture moves year to year. They can confirm an address, a profession, and a neighborhood long before or after a census year.
              - paragraph [ref=e920]:
                - strong [ref=e921]: "What you'll find:"
                - text: Names, addresses, occupations, and sometimes business listings. County histories may include biographical sketches of prominent residents.
