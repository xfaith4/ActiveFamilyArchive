              - generic [ref=e904]:
                - generic [ref=e905]: 🚢
                - generic [ref=e906]: Immigration & Naturalization
              - paragraph [ref=e907]: Passenger manifests and naturalization papers document the journey from one country to another and the process of becoming a citizen.
              - paragraph [ref=e908]:
                - strong [ref=e909]: "Why it matters:"
                - text: These records can reveal the exact village or town of origin in Europe — information that connects the American branch of the family to its roots abroad.
              - paragraph [ref=e910]:
                - strong [ref=e911]: "What you'll find:"
                - text: Port of departure, date of arrival, last residence abroad, closest relative in the home country, and the name of the contact in the destination country.
